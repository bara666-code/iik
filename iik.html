<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Pendakian Gunung Gede - Basecamp Haikal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }
        .form-container h2 {
            text-align: center;
            margin-bottom: 5px;
            color: #2c3e50;
        }
        .form-container p {
            text-align: center;
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #27ae60;
            outline: none;
        }
        .btn-submit {
            width: 100%;
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-submit:hover {
            background-color: #219653;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Form Booking</h2>
    <p>Basecamp Haikal - Pendakian Gunung Gede</p>
    
    <form id="bookingForm" onsubmit="kirimKeWhatsApp(event)">
        <div class="form-group">
            <label for="paket">Paket Pilihan</label>
            <select id="paket" required>
                <option value="" disabled selected>-- Pilih Paket --</option>
                <option value="TekTok">TekTok</option>
                <option value="Camp">Camp</option>
            </select>
        </div>

        <div class="form-group">
            <label for="nama_ketua">Nama Ketua</label>
            <input type="text" id="nama_ketua" placeholder="Masukkan nama ketua" required>
        </div>

        <div class="form-group">
            <label for="jumlah_personel">Jumlah Personel (Orang)</label>
            <input type="number" id="jumlah_personel" min="1" placeholder="Contoh: 5" required>
        </div>

        <div class="form-group">
            <label for="tanggal">Tanggal Pendakian</label>
            <input type="date" id="tanggal" required>
        </div>

        <button type="submit" class="btn-submit">Kirim Booking via WhatsApp</button>
    </form>
</div>

<script>
function kirimKeWhatsApp(event) {
    event.preventDefault();

    // Nomor tujuan tetap menggunakan 6283817718819
    const nomorWhatsApp = "6283817718819"; 

    const paket = document.getElementById('paket').value;
    const namaKetua = document.getElementById('nama_ketua').value;
    const jumlahPersonel = document.getElementById('jumlah_personel').value;
    const tanggal = document.getElementById('tanggal').value;

    // Mengubah format tanggal menjadi DD/MM/YYYY
    const infoTanggal = tanggal.split('-').reverse().join('/');

    // Isi template chat baru sesuai permintaanmu
    const teksChat = `Halo Admin Basecamp Haikal, saya ingin melakukan booking untuk pendakian Gunung Gede. Berikut adalah detail rencana pendakian kami:\n\n` +
                    `Paket Pilihan: ${paket}\n` +
                    `Nama Ketua: ${namaKetua}\n` +
                    `Jumlah Personel: ${jumlahPersonel} orang\n` +
                    `Tanggal Pendakian: ${infoTanggal}\n\n` +
                    `Mohon informasi lebih lanjut mengenai ketersediaan kuota dan langkah pembayaran selanjutnya. Terima kasih!`;

    const urlWhatsApp = `https://wa.me/${nomorWhatsApp}?text=${encodeURIComponent(teksChat)}`;

    window.open(urlWhatsApp, '_blank');
}
</script>

</body>
</html>
